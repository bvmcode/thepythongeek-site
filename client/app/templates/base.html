<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/bootstrap-5.1.3-dist/css/bootstrap.css">
    <link rel="stylesheet" href="/static/fontawesome-free-6.1.1-web/css/all.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Roboto:wght@300;400;500&family=Chakra+Petch:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
    <script type="module" src="{{ url_for('static', filename='node_modules/chart.js/dist/chart.umd.js') }}" async></script>
    <script src="https://cdn.plot.ly/plotly-3.4.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <title>{% block title %}{% endblock %}</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container-fluid">
            <a id="nav-title" class="navbar-brand" href="{{ url_for('home.home') }}">&nbsp;\\the_python_geek\\</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item nav-divider">
                        <a class="nav-link" href="{{ url_for('home.home') }}">Home</a>
                    </li>
                    <li class="nav-item nav-divider">
                        <a class="nav-link" href="{{ url_for('resume.resume') }}">Resume</a>
                    </li>
                    <li class="nav-item nav-divider">
                        <a class="nav-link" href="{{ url_for('project.project3') }}">My Wx Station</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('project.project5') }}">GFS Wx Models</a>
                    </li>
                </ul>
                <ul class="navbar-nav" id="nav-social-media">
                    <li class="nav-item">
                        <a class="nav-link" target="_blank" href="https://www.linkedin.com/in/martbar"
                           title="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" target="_blank" href="https://www.github.com/bvmcode"
                           title="GitHub"><i class="fa-brands fa-github"></i></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" target="_blank" href="https://medium.com/@the-python-geek"
                           title="Medium"><i class="fa-brands fa-medium"></i></a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <header id="page-header">
        <div id="page-header-inner">
            <img class="rounded-circle" src="/static/images/{% block title_img %}{% endblock %}" alt="Page header image">
            <h1>{% block title_h1 %}{% endblock %}</h1>
        </div>
    </header>

    <main class="py-4 px-2">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p class="footer-label">Connect with me</p>
        <div class="footer-icons">
            <a target="_blank" href="https://www.linkedin.com/in/martbar" title="LinkedIn">
                <i class="fa-brands fa-linkedin"></i>
            </a>
            <a target="_blank" href="https://www.github.com/bvmcode" title="GitHub">
                <i class="fa-brands fa-github"></i>
            </a>
            <a target="_blank" href="https://medium.com/@the-python-geek" title="Medium">
                <i class="fa-brands fa-medium"></i>
            </a>
        </div>
    </footer>

    <script src="/static/bootstrap-5.1.3-dist/js/bootstrap.bundle.js"></script>
</body>
</html>
